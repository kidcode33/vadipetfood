[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Vite SPA — tüm route'ları index.html'e yönlendir
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Functions için CORS preflight
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[dev]
  command   = "npm run dev"
  port      = 8888
  targetPort = 3000
  framework = "vite"
